<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Verify licence details and status." />
    <title>Licence Verification — BOCRA</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <div id="header"></div>
    <main id="main-content" class="page">
      <div class="container">
        <header class="page-header">
          <h1>Licence Verification</h1>
          <p>
            Verify if an operator or service has an active BOCRA licence.
          </p>
        </header>
        <form class="docs-filter" action="#" method="get">
          <div class="form-grid form-grid--2">
            <div class="form-field">
              <label for="licence-number">Licence number</label>
              <input id="licence-number" name="licence_number" type="text" />
            </div>
            <div class="form-field">
              <label for="operator-name">Operator name</label>
              <input id="operator-name" name="operator_name" type="text" />
            </div>
          </div>
          <div class="form-actions form-actions--compact">
            <a
              href="https://customerportal.bocra.org.bw/OnlineLicenseVerification/verify"
              target="_blank"
              rel="noopener noreferrer"
              class="btn primary"
              >Verify on official portal</a
            >
            <button type="reset" class="btn secondary">Clear</button>
          </div>
        </form>
      </div>
    </main>
    <div id="footer"></div>
    <script src="../js/main.js"></script>
  </body>
</html>
